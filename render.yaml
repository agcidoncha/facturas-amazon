services:
  - type: web
    name: facturas-amazon-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: facturas-pdfs
      mountPath: /var/data/facturas
      sizeGB: 5
    envVars:
      - key: PDF_STORAGE_PATH
        value: /var/data/facturas
      - key: DATABASE_URL
        sync: false
      - key: CRON_SECRET
        generateValue: true

  - type: cron
    name: facturas-amazon-descarga-mensual
    runtime: python
    plan: starter
    schedule: "0 7 7 * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.jobs.trigger_download
    envVars:
      - key: WEB_SERVICE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
